<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Débutant - Calculatrice</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .calculator { background: #333; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 300px; }
        .display { background: #a8dadc; width: 100%; height: 50px; margin-bottom: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding: 0 15px; box-sizing: border-box; font-size: 24px; font-weight: bold; color: #1d3557; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .num { background: #eee; }
        .op { background: #11d9d9; color: white; }
        .eq { background: #2a9d8f; color: white; grid-column: span 2; }
        .clr { background: #e76f51; color: white; grid-column: span 2; }
        button:hover { opacity: 0.8; transform: scale(0.95); }
        h1 { color: #333; margin-bottom: 20px; }
        a { margin-top: 30px; color: #666; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Projet Débutant : Calculatrice JS</h1>
    
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clr" onclick="clearDisplay()">AC</button>
            <button class="op" onclick="appendToDisplay('/')">/</button>
            <button class="op" onclick="appendToDisplay('*')">*</button>
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="op" onclick="appendToDisplay('+')">+</button>
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="eq" onclick="calculate()">=</button>
            <button class="num" onclick="appendToDisplay('0')">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        let displayValue = '0';

        function updateDisplay() {
            document.getElementById('display').innerText = displayValue;
        }

        function appendToDisplay(val) {
            if (displayValue === '0' && val !== '.') {
                displayValue = val;
            } else {
                displayValue += val;
            }
            updateDisplay();
        }

        function clearDisplay() {
            displayValue = '0';
            updateDisplay();
        }

        function calculate() {
            try {
                // Utilisation de eval pour la simplicité (projet débutant)
                displayValue = eval(displayValue).toString();
                updateDisplay();
            } catch (e) {
                displayValue = 'Erreur';
                updateDisplay();
                setTimeout(clearDisplay, 1500);
            }
        }
    </script>

    <a href="index.html">← Retour au portfolio</a>
</body>
</html>
